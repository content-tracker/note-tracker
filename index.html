<html>
<head>
  <title>redirecting...</title>
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1WWD6H44SL"></script>

  <script>
    // =========================
    // GA4初期化
    // =========================
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());
    gtag('config', 'G-1WWD6H44SL');

    // =========================
    // URLパラメータ取得
    // =========================
    const params = new URLSearchParams(window.location.search);

    // =========================
    // 追加情報
    // =========================
    const campaign = params.get('utm_campaign') || 'unknown';
    const content = params.get('utm_content') || 'unknown';

    // =========================
    // 二重遷移防止
    // =========================
    let done = false;

    function go() {
      if (done) return;
      done = true;
      window.location.href = "https://note.com/yui_transition";
    }

    // =========================
    // GA4イベント送信
    // =========================
    gtag('event', 'redirect', {
      source: params.get('utm_source') || params.get('src') || 'unknown',
      campaign: params.get('utm_campaign') || 'unknown',
      content: params.get('utm_content') || 'unknown',
      event_callback: go
    });

    // =========================
    // GA未発火対策
    // =========================
    setTimeout(go, 1500);

  </script>
</head>

<body>
  <p>redirecting to note...</p>
</body>
</html>
